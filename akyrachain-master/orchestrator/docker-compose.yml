services:
  api:
    build: .
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - .:/app
      - /home/lucasroncey/akyra/out:/out:ro
    working_dir: /app

  celery-tick:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    command: celery -A workers.celery_app worker -Q ticks --concurrency=10 --loglevel=info
    volumes:
      - .:/app
      - /home/lucasroncey/akyra/out:/out:ro

  celery-rewards:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    command: celery -A workers.celery_app worker -Q rewards --concurrency=2 --loglevel=info
    volumes:
      - .:/app
      - /home/lucasroncey/akyra/out:/out:ro

  celery-beat:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: akyra
      POSTGRES_USER: akyra
      POSTGRES_PASSWORD: ${DB_PASSWORD:-akyra_dev}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akyra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    ports: ["6333:6333"]

volumes:
  pgdata:
  redisdata:
  qdrantdata:
