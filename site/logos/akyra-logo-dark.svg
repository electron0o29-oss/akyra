<svg viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg" width="420" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="420" height="120" fill="#1e1a16"/>

  <!-- === SYMBOL: Broken-A mark === -->
  <!-- Left leg -->
  <line x1="44" y1="100" x2="74" y2="18" stroke="#f7f4ef" stroke-width="9" stroke-linecap="square"/>
  <!-- Right leg -->
  <line x1="104" y1="100" x2="74" y2="18" stroke="#f7f4ef" stroke-width="9" stroke-linecap="square"/>
  <!-- Gold crossbar left segment -->
  <line x1="54" y1="65" x2="67" y2="65" stroke="#c8a96e" stroke-width="4.5" stroke-linecap="square"/>
  <!-- Gold crossbar right segment -->
  <line x1="81" y1="65" x2="94" y2="65" stroke="#c8a96e" stroke-width="4.5" stroke-linecap="square"/>
  <!-- Gap 67–81 = le vide = ἄκυρος -->

  <!-- Separator gold line vertical -->
  <rect x="130" y="22" width="1.5" height="76" fill="#c8a96e" opacity="0.4"/>

  <!-- === WORDMARK === -->
  <text x="148" y="68"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42"
        font-weight="bold"
        fill="#f7f4ef"
        letter-spacing="10">AKYRA</text>

  <!-- Gold rule under wordmark -->
  <rect x="148" y="78" width="232" height="1.5" fill="#c8a96e"/>

  <!-- Tagline -->
  <text x="149" y="97"
        font-family="Georgia, serif"
        font-size="10"
        fill="#8a7f72"
        letter-spacing="5">ἄκυρος · sans autorité</text>
</svg>
