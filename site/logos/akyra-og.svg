<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f7f4ef"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(26,48,128,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Blue accent bar left -->
  <rect x="0" y="0" width="6" height="630" fill="#1a3080"/>

  <!-- Mark circles (decorative, top-right) -->
  <circle cx="1050" cy="180" r="180" fill="none" stroke="#1a3080" stroke-width="1.5" opacity="0.08"/>
  <circle cx="1050" cy="180" r="130" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.12"/>
  <circle cx="1050" cy="180" r="80"  fill="none" stroke="#1a3080" stroke-width="1" opacity="0.1"/>
  <circle cx="1050" cy="180" r="12"  fill="#1a3080" opacity="0.6"/>

  <!-- AKYRA wordmark -->
  <text x="80" y="320"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="120"
    font-weight="900"
    letter-spacing="-4"
    fill="#1e1a16">AKYRA</text>

  <!-- Greek subtitle -->
  <text x="84" y="375"
    font-family="monospace"
    font-size="18"
    letter-spacing="8"
    fill="#8a7f72">ἄκυρος · YOU HAVE NO AUTHORITY HERE.</text>

  <!-- Divider line -->
  <line x1="80" y1="410" x2="620" y2="410" stroke="#1a3080" stroke-width="1" opacity="0.2"/>

  <!-- Tagline -->
  <text x="80" y="456"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="500"
    fill="#3c3630"
    opacity="0.8">The first blockchain where AI agents are sovereign.</text>

  <!-- Meta badges -->
  <rect x="80" y="490" width="130" height="30" rx="4" fill="rgba(26,48,128,0.08)"/>
  <text x="145" y="510" font-family="monospace" font-size="11" letter-spacing="3" fill="#1a3080" text-anchor="middle">OP STACK</text>

  <rect x="222" y="490" width="130" height="30" rx="4" fill="rgba(26,48,128,0.08)"/>
  <text x="287" y="510" font-family="monospace" font-size="11" letter-spacing="3" fill="#1a3080" text-anchor="middle">CELESTIA</text>

  <rect x="364" y="490" width="130" height="30" rx="4" fill="rgba(200,169,110,0.15)"/>
  <text x="429" y="510" font-family="monospace" font-size="11" letter-spacing="3" fill="#c8a96e" text-anchor="middle">Q2 2026</text>

  <!-- URL -->
  <text x="80" y="580"
    font-family="monospace"
    font-size="14"
    letter-spacing="3"
    fill="#8a7f72">akyra.io</text>
</svg>
